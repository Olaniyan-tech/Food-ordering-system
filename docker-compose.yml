
services:
    web:
        build: .
        command: gunicorn food_site.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
        volumes:
            - .:/app
        ports:
            - "8000:8000"
        env_file:
            - .env
        depends_on:
            - redis
    
    worker:
        build: .
        command: 
            - sh 
            - -c 
            - sleep 5 && celery -A food_site worker --loglevel=info --pool=solo
        volumes:
            - .:/app
        env_file:
            - .env
        depends_on:
            - redis

    redis:
        image: redis:latest
        ports:
            - "6379:6379"