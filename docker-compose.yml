
services:
    web:
        build: .
        command: gunicorn food_site.wsgi:application --bind 0.0.0.0:8000
        ports:
            - "8000:8000"
        env_file:
            - .env
        depends_on:
            - redis
    
    worker:
        build: .
        command: celery -A food_site worker --loglevel=info --pool=solo
        env_file:
            - .env
        depends_on:
            - redis

    redis:
        image: redis:latest
        ports:
            - "6379:6379"